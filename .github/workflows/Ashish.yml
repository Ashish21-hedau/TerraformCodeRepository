name: Terraform CI Pipeline

on:
  push:
    branches:
      - master

  workflow_dispatch:

jobs:
  my_job:
    name: Deploy to staging
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Terraform Init
        working-directory: TerraformCodeRepository
        run: terraform init

      - name: Terraform Validate
        working-directory: TerraformCodeRepository
        run: terraform validate

      - name: Terraform Plan
        working-directory: TerraformCodeRepository
        run: terraform plan -input=false
