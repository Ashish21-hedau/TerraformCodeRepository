name: Terraform CI Pipeline
on:
  push:
    branches:
    - master
  
  workflow_dispatch:

jobs:
  my_job:
    name: deploy to staging
    runs-on: self-hosted
 
   steps:
      - uses: actions/checkout@v4
      
      - name: Run a one-line script
        run: echo Hello, world!

      - name: Run a multi-line terraform Init validate and Plan script
        run: |
            terrafom Init
            terraform validate
            terraform plan 
